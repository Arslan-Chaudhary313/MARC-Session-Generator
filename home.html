    <style>
        * { box-sizing: border-box; scroll-behavior: smooth; }
        body {
            background-color: #000814;

        #disclaimer-overlay {

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .disclaimer-wrapper {
            position: relative;
            width: 90%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        #disclaimer-box {

        .bh { font-weight: 900 !important; color: #ffffff !important; text-transform: uppercase; text-shadow: 0 0 8px #00ffcc; }

        .container {
            position: relative;

            background: rgba(0, 0, 0, 0.85);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #00ffcc;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.15);

        .wa-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 60px;
            height: 60px;
            background: #25d366;
            color: white;
            border-radius: 50%;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 2em;
            text-decoration: none;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), 0 0 15px rgba(37, 211, 102, 0.6);

            z-index: 1000;
        }

        @keyframes pulse-wa {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        /* Neon Divider Line Style */
        .neon-line {
            height: 1px;
            width: 100%;
            background: #00ffcc;
            margin-top: 25px;
            box-shadow: 0 0 10px #00ffcc, 0 0 5px #00ffcc;
            opacity: 0.7;
        }

        .social-footer {
            margin-top: 15px;
            padding-top: 5px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-footer a { color: #fff; font-size: 1.5em; transition: all 0.4s ease; text-decoration: none; display: inline-block; }
        .social-footer a:hover { color: #00ffcc; transform: translateY(-5px) scale(1.1); text-shadow: 0 0 10px #00ffcc; }

        .quote-box {

            margin: 15px 0;

            font-size: 0.95em; 
            overflow: hidden;
        }

        .quote-box img {

            height: auto;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
        }

        .video-container { width: 100%; border-radius: 15px; overflow: hidden; border: 2px solid #00ffcc; margin-bottom: 20px; }
        video { width: 100%; display: block; }
        .logo { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #fff; margin-bottom: 12px; }
        .step-box { display: none; }
        .active { display: block !important; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .opt-btn, .main-btn { width: 100%; padding: 14px; margin: 12px 0; border: 1px solid #00ffcc; background: transparent; color: #fff; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .opt-btn:hover, .main-btn:hover { background: rgba(0, 255, 204, 0.1); }
        .p-btn { display: none; padding: 6px 16px; background: #00ffcc; color: #000; border: 1px solid #fff; border-radius: 5px; font-weight: bold; font-size: 0.75em; cursor: pointer; }
        .disabled { opacity: 0.4; cursor: not-allowed !important; filter: grayscale(1); }
        input { width: 100%; padding: 14px; margin: 12px 0; border-radius: 10px; border: 1px solid #00ffcc; background: #0a0a0a; color: #fff; text-align: center; font-size: 1.1em; }
        .tmr { font-size: 0.85em; color: #ffcc00; margin-right: 8px; font-weight: bold; }
        .rolling { display: inline-block; animation: rotate 2s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>

    <script>
        const v = document.getElementById("marcvid"), tw = document.getElementById("typewriter-text"), gib = document.getElementById("got-it-btn");
        const waBtn = document.getElementById("wa-channel-btn");
        
        const content = `> <span class="bh">INITIALIZING SECURE TERMINAL...</span>
> <span class="bh">DEVELOPER:</span> ARSLAN CHAUDHARY
> <span class="bh">ROLE:</span> PROFESSIONAL FULL-STACK AUTOMATION DEVELOPER
> <span class="bh">PROJECT:</span> MARC-MD WHATSAPP SYSTEM
> ----------------------------------
> <span class="bh">SECURITY & SYSTEM PROTOCOLS:</span>
> 1. End-to-End Session Encryption.
> 2. No Personal Messages or Data Storage.
> 3. Verified WhatsApp Multi-Device API.
> 4. Automated Secure Handshake Protocol.
> 5. PROJECT DESIGNED FOR EDUCATIONAL PURPOSES ONLY.
> 
> <span class="bh">CONNECT WITH THE DEVELOPER:</span>
> - TIKTOK: @arslan_chaudhary_313
> - INSTAGRAM: arslan_chaudhary_313
> - FACEBOOK: Arslan0Chaudhary313
> - GITHUB: Arslan-Chaudhary313
> 
> <span class="bh">STATUS:</span> ALL SYSTEMS OPERATIONAL
> 
> <span class="bh">PRESS THE 'ACCEPT & START' BUTTON TO BEGIN.</span>`;

        let cIdx = 0;
        function typing() {
            if (cIdx < content.length) {
                if (content.substr(cIdx, 1) === '<') {
                    let end = content.indexOf('>', cIdx);
                    tw.innerHTML += content.substring(cIdx, end + 1);
                    cIdx = end + 1;
                } else { 
                    tw.innerHTML += content.charAt(cIdx); 
                    cIdx++; 
                }
                tw.scrollTop = tw.scrollHeight;
                setTimeout(typing, 10);
            } else { gib.style.display = "block"; }
        }

        function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

        function closeDisclaimer() { 
            document.getElementById("disclaimer-overlay").style.display = "none";
            waBtn.style.display = "flex";
            v.muted = false; 
            v.play(); 
            showStep('gender');
        }

        function showStep(sId) {
            scrollToTop();
            document.querySelectorAll('.step-box').forEach(b => b.classList.remove('active'));
            document.getElementById('step-' + sId).classList.add('active');
            if(sId === 'quote1' || sId === 'quote2') runTimer(5, 'tmr-' + sId, 'btn-' + sId);
            if(sId === 'kalma') runTimer(7, 'tmr-kalma', 'btn-kalma');
            if(sId === 'durood') runTimer(15, 'tmr-durood', 'btn-durood');
        }

        const allQuotes = [
            "The revolution is not an apple that falls when it is ripe. You have to make it fall.",
            "Silence is argument carried out by other means.",
            "Better to die standing than to live on your knees.",
            "The first duty of a revolutionary is to be educated."
        ];

        function selectGender(g) { showStep('religion'); }

        function startNonMuslimPath() {
            let shuffled = allQuotes.sort(() => 0.5 - Math.random());
            document.getElementById('q1-text').innerText = `"${shuffled[0]}"`;
            document.getElementById('q2-text').innerText = `"${shuffled[1]}"`;
            showStep('quote1');
        }

        function handleMuslim() { v.pause(); showStep('kalma'); }
        function finalize() { v.play(); showStep('phone'); }

        function runTimer(sec, tId, bId) {
            let left = sec;
            const te = document.getElementById(tId), be = document.getElementById(bId);
            te.style.display = 'inline'; be.style.display = 'block'; be.classList.add('disabled'); be.disabled = true;
            const timer = setInterval(() => {
                left--; te.innerText = left + "s";
                if (left <= 0) { clearInterval(timer); te.style.display = 'none'; be.classList.remove('disabled'); be.disabled = false; }
            }, 1000);
        }

        async function getCode() {
            const phoneInput = document.getElementById('phone');
            const p = phoneInput.value.trim(); 
            const loadingDiv = document.getElementById('loading');
            const pairingDiv = document.getElementById('pairing-display');
            const copyBtn = document.getElementById('copy-btn');
            const mainBtn = document.querySelector('.main-btn');

            if(!p) return alert("Please enter number with country code!");

            loadingDiv.style.display = 'block';
            pairingDiv.style.display = 'none';
            copyBtn.style.display = 'none';
            mainBtn.disabled = true;
            mainBtn.style.opacity = "0.5";

            try {
                const response = await fetch(`${window.location.origin}/get-code?number=${p}`);
                const data = await response.json();
                if (data.code) {
                    loadingDiv.style.display = 'none';
                    pairingDiv.innerText = data.code; 
                    pairingDiv.style.display = 'block';
                    copyBtn.style.display = 'block';
                    mainBtn.disabled = false;
                    mainBtn.style.opacity = "1";
                } else { throw new Error(data.error); }
            } catch (err) {
                alert("Generation error! Please check number or retry.");
                loadingDiv.style.display = 'none';
                mainBtn.disabled = false;
                mainBtn.style.opacity = "1";
            }
        }

        function copyCode() { 
            const code = document.getElementById('pairing-display').innerText;
            navigator.clipboard.writeText(code); 
            alert("Pairing Code Copied!"); 
        }

        window.onload = typing;
    </script>
